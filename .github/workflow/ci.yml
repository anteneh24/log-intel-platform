name: Platform CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven (Lint & Unit Tests)
        run: mvn clean verify -Pcheckstyle,spotless

      - name: Integration Tests (Testcontainers)
        run: mvn test -pl platform-it -am
        env:
          # Enable Docker-in-Docker support for Testcontainers
          TESTCONTAINERS_RYUK_DISABLED: false

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./target/site/jacoco/jacoco.xml
