server:
  port: 8060

spring:
  application:
    name: service-embedding-worker
  datasource:
    url: jdbc:postgresql://localhost:5432/logintel
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      type: batch
      ack-mode: manual_immediate
    consumer:
      group-id: embedding-worker-group
      max-poll-records: 4
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        max.poll.interval.ms: 900000
        session.timeout.ms: 45000
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.platform.*"
        spring.json.value.default.type: "com.platform.worker.model.EmbedRequest"
        spring.json.use.type.headers: false

embedding:
  provider: ollama
  # gemma4:e2b is chat/vision-only (Ollama: "this model does not support embeddings").
  # Use an embedding-capable model; embeddinggemma:300m is installed locally (768 dims).
  model-name: embeddinggemma:300m
  ollama:
    base-url: http://localhost:11434
    timeout-seconds: 600
  worker:
    embed-chunk-size: 2

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
